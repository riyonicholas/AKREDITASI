<!DOCTYPE html>
<html lang="en">
<head>
    <title>Uji Coba CRUD Master CPL</title>
</head>
<body>
    <h1>Tabel Master: CPL</h1>
    <div id="auth-section">
        <h3>1. Login (Dapatkan Token JWT)</h3>
        <input type="text" id="username" placeholder="Username" value="admin">
        <input type="password" id="password" placeholder="Password" value="password123">
        <button onclick="login()">Login</button>
        <p>Token: <small id="token-status">Belum Login</small></p>
    </div>
    <hr>
    <div id="form-section">
        <h3>2. Input/Update Data</h3>
        <input type="hidden" id="id_cpl">
        <input type="number" id="id_prodi" placeholder="ID Prodi"><br>
        <!-- Kode CPL dibuat otomatis oleh backend -->
        <textarea id="deskripsi_cpl" placeholder="Deskripsi CPL" rows="3" cols="30"></textarea><br><br>
        <button onclick="saveData()">Simpan Data</button>
        <button onclick="resetForm()">Reset Form</button>
    </div>
    <hr>
    <div id="list-section">
        <h3>3. Data CPL</h3>
        <button onclick="fetchData()">Refresh Data</button>
        <table border="1" id="data-table" style="width: 100%; margin-top: 10px;">
            <thead>
                <tr>
                    <th>ID CPL</th><th>Prodi</th><th>Kode CPL</th><th>Deskripsi</th><th>Aksi</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <script>
        const BASE_URL = 'http://localhost:5000/api';
        let token = localStorage.getItem('token') || '';

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const res = await fetch(`${BASE_URL}/auth/login`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const result = await res.json();
            if (result.success) {
                token = result.token; localStorage.setItem('token', token);
                document.getElementById('token-status').innerText = 'Tersimpan!'; alert('Login Berhasil!');
            } else alert(result.message);
        }

        async function fetchData() {
            const res = await fetch(`${BASE_URL}/master/cpl`, { headers: { 'Authorization': `Bearer ${token}` } });
            const result = await res.json();
            const tbody = document.querySelector('#data-table tbody'); tbody.innerHTML = '';
            if (result.success) {
                result.data.forEach(item => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${item.id_cpl}</td><td>${item.nama_prodi || item.id_prodi}</td><td>${item.kode_cpl}</td>
                            <td>${item.deskripsi_cpl}</td>
                            <td><button onclick="editData(${item.id_cpl}, ${item.id_prodi}, '${item.deskripsi_cpl.replace(/'/g, "\\'")}')">Edit</button>
                            <button onclick="deleteData(${item.id_cpl})">Hapus</button></td>
                        </tr>
                    `;
                });
            }
        }

        function editData(id, prodi, deskripsi) {
            document.getElementById('id_cpl').value = id;
            document.getElementById('id_prodi').value = prodi;
            document.getElementById('deskripsi_cpl').value = deskripsi;
        }

        async function saveData() {
            const id = document.getElementById('id_cpl').value;
            const data = {
                id_prodi: document.getElementById('id_prodi').value,
                deskripsi_cpl: document.getElementById('deskripsi_cpl').value
            };
            const res = await fetch(id ? `${BASE_URL}/master/cpl/${id}` : `${BASE_URL}/master/cpl`, {
                method: id ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(data)
            });
            const result = await res.json(); alert(result.message);
            fetchData(); resetForm();
        }

        async function deleteData(id) {
            if (confirm('Yakin hapus?')) {
                const res = await fetch(`${BASE_URL}/master/cpl/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
                const result = await res.json(); alert(result.message); fetchData();
            }
        }

        function resetForm() { 
            document.querySelectorAll('#form-section input').forEach(el => el.value = ''); 
            document.getElementById('deskripsi_cpl').value = '';
        }
    </script>
</body>
</html>
