<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Master Unit Kerja - STIKOM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-8 text-slate-800">
    <div class="max-w-3xl mx-auto bg-white p-10 rounded-3xl shadow-xl border border-slate-100">
        <div class="flex justify-between items-center mb-8 border-b pb-6">
            <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tight">Master Unit Kerja</h1>
            <button onclick="showForm()" class="bg-indigo-600 text-white px-6 py-2.5 rounded-xl font-bold text-sm shadow-lg hover:bg-indigo-500 transition">+ Tambah Unit</button>
        </div>

        <div class="overflow-hidden rounded-2xl border border-slate-200 shadow-inner">
            <table class="w-full border-collapse">
                <thead>
                    <tr class="bg-slate-100 text-xs uppercase font-black text-slate-500 tracking-widest">
                        <th class="p-4 text-center border-r border-slate-200 w-20">ID</th>
                        <th class="p-4 text-left">Nama Unit Kerja</th>
                        <th class="p-4 text-center w-32">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tbody" class="text-sm bg-white"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-slate-900/50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-3xl w-full max-w-md shadow-2xl">
            <h2 id="modal-title" class="text-xl font-black mb-6 text-indigo-600 uppercase">Tambah Unit Kerja</h2>
            <form id="form" onsubmit="saveData(event)">
                <input type="hidden" id="id_unit">
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] uppercase font-black text-slate-400 mb-2 tracking-widest">Nama Unit Kerja</label>
                        <input type="text" id="nama_unit" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition" required placeholder="Contoh: SISFO">
                    </div>
                </div>
                <div class="flex justify-end gap-3 mt-8">
                    <button type="button" onclick="hideForm()" class="px-6 py-2 text-slate-400 font-bold text-sm">Batal</button>
                    <button type="submit" class="bg-indigo-600 text-white px-8 py-2.5 rounded-xl font-bold text-sm shadow-xl hover:bg-indigo-500 transition">Simpan Data</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:5000/api/master/unit-kerja";
        let token = localStorage.getItem('token');

        async function loadData() {
            try {
                const res = await fetch(API_URL, { headers: { 'Authorization': `Bearer ${token}` } });
                const result = await res.json();
                if (result.success) {
                    const tbody = document.getElementById('tbody');
                    tbody.innerHTML = result.data.map(r => `
                        <tr class="border-b border-slate-100 hover:bg-indigo-50/30 transition">
                            <td class="p-4 border-r border-slate-100 text-center font-bold text-slate-300">${r.id_unit}</td>
                            <td class="p-4 font-bold text-slate-700 uppercase text-xs tracking-wide">${r.nama_unit}</td>
                            <td class="p-4 text-center">
                                <button onclick="editData(${r.id_unit})" class="text-indigo-600 font-bold mr-4 text-xs">Edit</button>
                                <button onclick="deleteData(${r.id_unit})" class="text-rose-500 font-bold text-xs">Hapus</button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (e) { console.error(e); }
        }

        function showForm() {
            document.getElementById('form').reset();
            document.getElementById('id_unit').value = "";
            document.getElementById('modal-title').innerText = "Tambah Unit Kerja";
            document.getElementById('modal').classList.remove('hidden');
        }

        function hideForm() { document.getElementById('modal').classList.add('hidden'); }

        async function editData(id) {
            const res = await fetch(`${API_URL}/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
            const result = await res.json();
            if (result.success) {
                const d = result.data;
                document.getElementById('id_unit').value = d.id_unit;
                document.getElementById('nama_unit').value = d.nama_unit;
                document.getElementById('modal-title').innerText = "Edit Unit Kerja";
                document.getElementById('modal').classList.remove('hidden');
            }
        }

        async function saveData(e) {
            e.preventDefault();
            const id = document.getElementById('id_unit').value;
            const data = { nama_unit: document.getElementById('nama_unit').value };

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            alert(result.message);
            hideForm();
            loadData();
        }

        async function deleteData(id) {
            if (confirm("Hapus unit ini secara permanen?")) {
                const res = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await res.json();
                alert(result.message);
                loadData();
            }
        }

        if(!token) {
            token = prompt("Masukkan Token Auth:");
            localStorage.setItem('token', token);
        }
        loadData();
    </script>
</body>
</html>
