<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Uji Coba 4.A.1 Sarpras PkM</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eee; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: center; }
        th { background: #BFBFBF; }
        .row-kuning { background: #FFFF00; }
        input, select, textarea { width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box; }
        button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; color: white; }
        .btn-blue { background: #007bff; }
        .btn-green { background: #28a745; }
        .btn-red { background: #dc3545; }
        .btn-gold { background: #ffc107; color: black; }
    </style>
</head>
<body>

<div class="card">
    <h2>Dashboard 4.A.1: Sarpras PkM</h2>
    <input type="text" id="u" placeholder="Username">
    <input type="password" id="p" placeholder="Password">
    <button onclick="login()" class="btn-blue">Login</button>
    <hr>
    <label>ID Prodi:</label> <input type="number" id="f_prodi" value="1" style="width: 70px;">
    <button onclick="refreshData()" class="btn-green">Refresh Data</button>
    <button onclick="exportExcel()" class="btn-gold">Download Excel LKPS</button>
</div>

<div class="card">
    <h3>Input Sarpras PkM</h3>
    <input type="hidden" id="id_4a1">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <input type="text" id="nama_prasarana" placeholder="Nama Prasarana (Lab/Bengkel)">
        <input type="number" id="daya_tampung" placeholder="Daya Tampung">
        <input type="number" id="luas_ruang" step="0.01" placeholder="Luas Ruang (m2)">
        <select id="status_milik">
            <option value="M">Milik Sendiri (M)</option>
            <option value="W">Sewa (W)</option>
        </select>
        <select id="status_lisensi">
            <option value="L">Berlisensi (L)</option>
            <option value="P">Public Domain (P)</option>
            <option value="T">Tidak Berlisensi (T)</option>
        </select>
        <input type="text" id="link_bukti" placeholder="Link Bukti">
    </div>
    <textarea id="perangkat" placeholder="Detail Perangkat"></textarea>
    <input type="text" id="info_tambahan" placeholder="Info Tambahan (Kolom .....)">
    <button onclick="simpan()" class="btn-blue">Simpan Data</button>
    <button onclick="reset()" style="background: grey;">Reset</button>
</div>

<div class="card">
    <h3>Preview Tabel 4.A.1</h3>
    <table id="table-aktif">
        <thead>
            <tr>
                <th>Prasarana</th><th>Daya</th><th>Luas</th><th>Milik</th><th>Lisensi</th><th>Perangkat</th><th>.....</th><th>Aksi</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const API = 'http://localhost:5000/api/sarpras/4a1-sarana-prasarana-pkm';
    let token = '';

    async function login() {
        const res = await fetch('http://localhost:5000/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: document.getElementById('u').value, password: document.getElementById('p').value })
        });
        const d = await res.json();
        if(d.success) { token = d.token; alert("Login OK!"); refreshData(); }
    }

    async function refreshData() {
        const pid = document.getElementById('f_prodi').value;
        const res = await fetch(`${API}?id_prodi=${pid}`, { headers: { 'Authorization': `Bearer ${token}` } });
        const result = await res.json();
        document.querySelector('#table-aktif tbody').innerHTML = result.data.map(d => `
            <tr class="row-kuning">
                <td>${d.nama_prasarana}</td><td>${d.daya_tampung}</td><td>${d.luas_ruang}</td>
                <td>${d.status_milik}</td><td>${d.status_lisensi}</td><td>${d.perangkat}</td><td>${d.info_tambahan}</td>
                <td><button onclick='isiEdit(${JSON.stringify(d)})' class="btn-gold">Edit</button> <button onclick="hapus(${d.id_4a1})" class="btn-red">Hapus</button></td>
            </tr>
        `).join('');
    }

    async function simpan() {
        const id = document.getElementById('id_4a1').value;
        const body = {
            id_prodi: document.getElementById('f_prodi').value,
            nama_prasarana: document.getElementById('nama_prasarana').value,
            daya_tampung: document.getElementById('daya_tampung').value,
            luas_ruang: document.getElementById('luas_ruang').value,
            status_milik: document.getElementById('status_milik').value,
            status_lisensi: document.getElementById('status_lisensi').value,
            perangkat: document.getElementById('perangkat').value,
            info_tambahan: document.getElementById('info_tambahan').value,
            link_bukti: document.getElementById('link_bukti').value
        };
        await fetch(id ? `${API}/${id}` : API, {
            method: id ? 'PUT' : 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify(body)
        });
        reset(); refreshData();
    }

    function isiEdit(d) {
        document.getElementById('id_4a1').value = d.id_4a1;
        document.getElementById('nama_prasarana').value = d.nama_prasarana;
        document.getElementById('daya_tampung').value = d.daya_tampung;
        document.getElementById('luas_ruang').value = d.luas_ruang;
        document.getElementById('status_milik').value = d.status_milik;
        document.getElementById('status_lisensi').value = d.status_lisensi;
        document.getElementById('perangkat').value = d.perangkat;
        document.getElementById('info_tambahan').value = d.info_tambahan;
        document.getElementById('link_bukti').value = d.link_bukti;
    }

    async function hapus(id) {
        if(confirm("Hapus?")) { await fetch(`${API}/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } }); refreshData(); }
    }

    function reset() { document.getElementById('id_4a1').value = ''; }
    function exportExcel() { window.open(`${API}/export?id_prodi=${document.getElementById('f_prodi').value}&token=${token}`); }
</script>
</body>
</html>
