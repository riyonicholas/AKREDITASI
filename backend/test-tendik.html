<!DOCTYPE html>
<html lang="en">
<head>
    <title>Uji Coba CRUD Master Tendik</title>
</head>
<body>
    <h1>Tabel Master: Tendik (Tenaga Kependidikan)</h1>
    <div id="auth-section">
        <h3>1. Login (Dapatkan Token JWT)</h3>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p>Token: <small id="token-status">Belum Login</small></p>
    </div>
    <hr>
    <div id="form-section">
        <h3>2. Input/Update Data Tendik</h3>
        <input type="hidden" id="id_tendik">
        <input type="number" id="id_pegawai" placeholder="ID Pegawai"><br>
        <input type="text" id="jenis_tendik" placeholder="Jenis Tendik (Misal: Pustakawan)"><br><br>
        <button onclick="saveData()">Simpan Data</button>
        <button onclick="resetForm()">Reset Form</button>
    </div>
    <hr>
    <div id="list-section">
        <h3>3. Data Tendik</h3>
        <button onclick="fetchData()">Refresh Data</button>
        <table border="1" id="data-table" style="width: 100%; margin-top: 10px;">
            <thead>
                <tr>
                    <th>ID Tendik</th><th>Nama (Pegawai)</th><th>Jenis Tendik</th><th>Aksi</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <script>
        const BASE_URL = 'http://localhost:5000/api';
        let token = localStorage.getItem('token') || '';

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const res = await fetch(`${BASE_URL}/auth/login`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const result = await res.json();
            if (result.success) {
                token = result.token; localStorage.setItem('token', token);
                document.getElementById('token-status').innerText = 'Tersimpan!'; alert('Login Berhasil!');
            } else alert(result.message);
        }

        async function fetchData() {
            const res = await fetch(`${BASE_URL}/master/tendik`, { headers: { 'Authorization': `Bearer ${token}` } });
            const result = await res.json();
            const tbody = document.querySelector('#data-table tbody'); tbody.innerHTML = '';
            if (result.success) {
                result.data.forEach(item => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${item.id_tendik}</td><td>${item.nama_lengkap}</td><td>${item.jenis_tendik || '-'}</td>
                            <td><button onclick="editData(${item.id_tendik}, '${item.id_pegawai}', '${item.jenis_tendik || ''}')">Edit</button>
                            <button onclick="deleteData(${item.id_tendik})">Hapus</button></td>
                        </tr>
                    `;
                });
            }
        }

        function editData(id, peg, jenis) {
            document.getElementById('id_tendik').value = id;
            document.getElementById('id_pegawai').value = peg;
            document.getElementById('jenis_tendik').value = jenis;
        }

        async function saveData() {
            const id = document.getElementById('id_tendik').value;
            const data = {
                id_pegawai: document.getElementById('id_pegawai').value,
                jenis_tendik: document.getElementById('jenis_tendik').value
            };
            const res = await fetch(id ? `${BASE_URL}/master/tendik/${id}` : `${BASE_URL}/master/tendik`, {
                method: id ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(data)
            });
            const result = await res.json(); alert(result.message);
            fetchData(); resetForm();
        }

        async function deleteData(id) {
            if (confirm('Yakin hapus?')) {
                const res = await fetch(`${BASE_URL}/master/tendik/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
                const result = await res.json(); alert(result.message); fetchData();
            }
        }

        function resetForm() { document.querySelectorAll('#form-section input').forEach(el => el.value = ''); }
    </script>
</body>
</html>
